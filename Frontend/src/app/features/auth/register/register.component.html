<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <span class="logo-icon">🎫</span>
        <h1>TicketCycle</h1>
      </div>
      <p>Create a new account</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" class="form-control" placeholder="John Doe"
          [class.is-invalid]="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched" />
        <div class="invalid-feedback">Name must be at least 2 characters.</div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-control" placeholder="you@example.com"
          [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" />
        <div class="invalid-feedback">Enter a valid email.</div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Min 6 characters"
          [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" />
        <div class="invalid-feedback">Password must be at least 6 characters.</div>
      </div>

      <div class="form-group">
        <label>Role</label>
        <select formControlName="role" class="form-control">
          <option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
    </div>
  </div>
</div>
