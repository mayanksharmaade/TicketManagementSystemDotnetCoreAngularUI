<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>Create New Ticket</h2>
      <p>Fill in the details to create a new ticket</p>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="ticket-form">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" formControlName="title" class="form-control" placeholder="Enter a descriptive title..."
          [class.is-invalid]="ticketForm.get('title')?.invalid && ticketForm.get('title')?.touched" />
        <div class="invalid-feedback">Title must be at least 5 characters.</div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" class="form-control" rows="5"
          placeholder="Describe the issue or task in detail..."
          [class.is-invalid]="ticketForm.get('description')?.invalid && ticketForm.get('description')?.touched"></textarea>
        <div class="invalid-feedback">Description must be at least 10 characters.</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Priority *</label>
          <select formControlName="priority" class="form-control">
            <option *ngFor="let p of priorities" [value]="p.value">{{ p.label }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Due Date</label>
          <input type="date" formControlName="dueDate" class="form-control" />
        </div>
      </div>

      <div class="form-group">
        <label>Assign to Developer</label>
        <select formControlName="assignedToId" class="form-control">
          <option [value]="null">Select developer (optional)...</option>
          <option *ngFor="let d of developers" [value]="d.id">{{ d.fullName }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="ticketForm.invalid || loading">
          {{ loading ? 'Creating...' : '🎫 Create Ticket' }}
        </button>
      </div>
    </form>
  </div>
</div>
